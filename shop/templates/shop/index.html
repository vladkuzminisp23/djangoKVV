{% extends 'shop/base.html' %}
{% block content %}
<div class="product-grid">
    {% for p in products %}
    <div class="card">
        <a href="{% url 'product_detail' p.pk %}" style="text-decoration: none; color: inherit;">
            <img src="{{ p.image.url }}" alt="{{ p.name }}">
            <h3>{{ p.name }}</h3>
        </a>
        
        <div class="price">{{ p.price }} ₽</div>
        
        <a href="{% url 'cart_add' p.pk %}" style="display: block; background: var(--gold); color: black; padding: 10px; text-align: center; margin-top: 15px; text-decoration: none; font-weight: bold; border-radius: 5px; transition: 0.3s;">
            🛒 В КОРЗИНУ
        </a>
    </div>
    {% endfor %}
</div>
{% endblock %}
